# Production overlay — bind ports to Tailscale IP only.
#
# Usage (via script):
#   ./scripts/prod_up.sh
#
# Manual usage:
#   LUCID_BIND_IP=100.x.y.z \
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# LUCID_BIND_IP is read by docker-compose.yml (defaults to 0.0.0.0 for dev).
# This overlay has no additional port directives — Docker Compose appends port
# entries rather than replacing them, so a duplicate entry here would produce
# two conflicting bindings (0.0.0.0:PORT and TAILSCALE_IP:PORT simultaneously).
#
# The IP restriction is achieved purely via the LUCID_BIND_IP env var that
# prod_up.sh exports before calling docker compose.

services: {}
