services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/prompts:/app/prompts
      - ./backend/fonts:/app/fonts
      - lucid-data:/app/data
      - ./config.json:/app/config.json
      - ./backend/matrix_settings.json:/app/matrix_settings.json
      - ./backend/logs:/app/logs
      - ./.git:/app/.git:ro
    env_file:
      - path: .env
        required: false
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_DEBUG_LOG=${LLM_DEBUG_LOG:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - lucid-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/app/src
    env_file:
      - path: .env
        required: false
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lucid-network

networks:
  lucid-network:
    driver: bridge

volumes:
  lucid-data:
